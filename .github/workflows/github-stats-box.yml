name: Update GitHub stats gist

# Reuses PRODUCTIVE_GH_TOKEN (classic PAT with gist and repo scopes).

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/github-stats-box.yml
      - .github/scripts/update-github-stats.mjs
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-stats-box
  cancel-in-progress: true

jobs:
  update-gist:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out profile repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Update pinned GitHub stats gist
        run: node .github/scripts/update-github-stats.mjs
        env:
          GH_TOKEN: ${{ secrets.PRODUCTIVE_GH_TOKEN }}
          GIST_ID: f56b3fde68e0ea1ce33e1dee3f27f8cd
